<style>
  /* === Design tokens === */
  :root {
    --bg-base: #0a0e1a;
    --surface: rgba(22, 29, 47, 0.65);
    --surface-elevated: rgba(28, 36, 60, 0.85);
    --border: rgba(255, 255, 255, 0.06);
    --border-strong: rgba(255, 255, 255, 0.12);
    --text: #f1f5fc;
    --text-muted: #8b96b0;
    --text-faint: #5d6680;
    --accent: #22c55e;
    --accent-soft: rgba(34, 197, 94, 0.15);
    --accent-glow: rgba(34, 197, 94, 0.45);
    --amber: #fbbf24;
    --success: #22c55e;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
    --shadow-md: 0 8px 32px rgba(0,0,0,0.4);
    --shadow-glow: 0 0 0 1px rgba(255,255,255,0.06), 0 12px 40px var(--accent-glow);
    --easing: cubic-bezier(0.4, 0, 0.2, 1);
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg-base);
    color: var(--text);
    font: 16px/1.5 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", system-ui, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body {
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(34, 197, 94, 0.18), transparent 60%),
      radial-gradient(ellipse 60% 40% at 90% 30%, rgba(34, 197, 94, 0.08), transparent 70%),
      var(--bg-base);
  }

  .wrap {
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 20px 40px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* === Top bar === */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    padding: 4px;
  }
  .brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
    letter-spacing: -0.01em;
  }
  .brand-mark {
    width: 24px; height: 24px;
    border-radius: 6px;
    background: linear-gradient(135deg, #fbbf24, #f59e0b);
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .brand-mark svg { width: 14px; height: 14px; }
  .stats-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 7px 14px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
  }
  .stats-pill strong { color: var(--accent); font-weight: 700; }
  .stats-pill .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--text-faint); }
  .stats-pill.hidden { display: none; }

  /* === Hero === */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-align: center;
    padding: 12px 0 32px;
  }
  .hero-icon {
    width: 88px; height: 88px;
    margin: 0 auto 24px;
    border-radius: 24px;
    background: linear-gradient(135deg, rgba(34, 197, 94, 0.2), rgba(34, 197, 94, 0.05));
    border: 1px solid rgba(34, 197, 94, 0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 60px rgba(34, 197, 94, 0.25);
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 60px rgba(34, 197, 94, 0.2); }
    50% { transform: scale(1.02); box-shadow: 0 0 80px rgba(34, 197, 94, 0.35); }
  }
  .hero-icon svg { width: 44px; height: 44px; color: var(--accent); }
  h1 {
    font-size: clamp(32px, 8vw, 40px);
    font-weight: 700;
    letter-spacing: -0.025em;
    line-height: 1.05;
    margin: 0 0 12px;
    color: var(--text);
  }
  .lead {
    font-size: 16px;
    color: var(--text-muted);
    margin: 0 auto 36px;
    line-height: 1.5;
    max-width: 360px;
  }

  /* === Done banner === */
  .done-banner {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: rgba(34, 197, 94, 0.12);
    border: 1px solid rgba(34, 197, 94, 0.3);
    border-radius: 14px;
    padding: 14px 18px;
    color: var(--success);
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 16px;
    animation: slideDown 0.4s var(--easing) both;
  }
  .done-banner svg { width: 18px; height: 18px; }

  /* === First-time share prompt === */
  .first-share {
    background: linear-gradient(135deg, rgba(251,191,36,0.15), rgba(251,191,36,0.04));
    border: 1px solid rgba(251,191,36,0.35);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 24px;
    text-align: center;
    animation: slideDown 0.4s var(--easing) both;
  }
  .first-share p { margin: 0 0 10px; font-size: 13px; color: var(--text); line-height: 1.45; }
  .first-share button {
    background: var(--amber); color: #1a1300; border: 0;
    border-radius: 10px; padding: 10px 18px;
    font-weight: 700; font-size: 13px; cursor: pointer;
    font-family: inherit;
  }
  .first-share button:active { transform: scale(0.97); }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .hidden { display: none !important; }

  /* === Primary CTA === */
  .cta-primary {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    border: 0;
    border-radius: 16px;
    padding: 20px 24px;
    font: inherit;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: #0a0e1a;
    background: linear-gradient(135deg, #4ade80, #22c55e);
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.15s var(--easing), box-shadow 0.3s var(--easing), filter 0.2s;
    box-shadow: var(--shadow-glow);
    position: relative;
    overflow: hidden;
  }
  .cta-primary::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .cta-primary:hover { filter: brightness(1.08); }
  .cta-primary:hover::before { opacity: 1; }
  .cta-primary:active { transform: scale(0.97); }
  .cta-primary svg { width: 22px; height: 22px; }

  /* === Secondary === */
  .secondary-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 14px;
  }
  .btn-ghost {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    border: 1px solid var(--border-strong);
    border-radius: 14px;
    padding: 14px 18px;
    font: inherit;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    background: var(--surface);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    cursor: pointer;
    transition: all 0.2s var(--easing);
    text-decoration: none;
  }
  .btn-ghost:hover {
    background: var(--surface-elevated);
    border-color: rgba(255, 255, 255, 0.2);
  }
  .btn-ghost:active { transform: scale(0.98); }
  .btn-ghost svg { width: 16px; height: 16px; opacity: 0.8; }

  /* === Info card === */
  .info-card {
    margin-top: 32px;
    padding: 16px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
  }
  .info-card details { margin: 0; }
  .info-card summary {
    cursor: pointer;
    color: var(--text);
    font-weight: 600;
    font-size: 14px;
    list-style: none;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 2px 0;
  }
  .info-card summary::-webkit-details-marker { display: none; }
  .info-card summary::after {
    content: '';
    width: 8px; height: 8px;
    border-right: 1.5px solid var(--text-muted);
    border-bottom: 1.5px solid var(--text-muted);
    transform: rotate(45deg);
    transition: transform 0.2s var(--easing);
  }
  .info-card details[open] summary::after { transform: rotate(-135deg); }
  .info-card details p { margin: 12px 0 0; }
  .info-card a { color: var(--amber); text-decoration: none; }
  .info-card a:hover { text-decoration: underline; }

  /* === Firefox install card === */
  .ff-card {
    margin-top: 16px;
    padding: 18px;
    background: linear-gradient(135deg, rgba(251, 146, 60, 0.15), rgba(249, 115, 22, 0.05));
    border: 1px solid rgba(251, 146, 60, 0.3);
    border-radius: 16px;
    color: var(--text);
    font-size: 14px;
    animation: slideDown 0.4s var(--easing) both;
  }
  .ff-card h3 {
    margin: 0 0 12px;
    font-size: 14px;
    font-weight: 700;
    color: #fdba74;
    letter-spacing: -0.01em;
  }
  .ff-step {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin: 8px 0;
    font-size: 13px;
    color: var(--text-muted);
  }
  .ff-num {
    flex: 0 0 22px; height: 22px;
    border-radius: 50%;
    background: rgba(251, 146, 60, 0.2);
    color: #fdba74;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 11px;
  }
  .ff-key {
    display: inline-block;
    background: rgba(0,0,0,0.3);
    padding: 1px 6px;
    border-radius: 4px;
    font-family: ui-monospace, monospace;
    font-size: 12px;
    color: var(--text);
  }
  .ff-card .nb {
    margin-top: 10px;
    font-size: 12px;
    color: var(--text-faint);
    line-height: 1.5;
  }

  /* === Footer === */
  .footer {
    margin-top: auto;
    padding-top: 24px;
    text-align: center;
    font-size: 12px;
    color: var(--text-faint);
  }
  .footer a {
    color: var(--text-faint);
    text-decoration: none;
    transition: color 0.2s;
  }
  .footer a:hover { color: var(--text-muted); }
  .footer .sep { margin: 0 8px; opacity: 0.5; }
</style>
